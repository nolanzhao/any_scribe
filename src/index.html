<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnyScribe</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Download Overlay -->
    <div id="model-overlay" class="overlay hidden">
      <div class="overlay-card">
        <svg id="overlay-icon" class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v10m0 0l3-3m-3 3l-3-3"/>
          <path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/>
        </svg>
        <h2 id="overlay-title">需要下载语音模型</h2>
        <p id="overlay-desc" class="overlay-desc">首次使用需要下载 Whisper 语音识别模型</p>
        <div id="overlay-info" class="model-info">
          <div class="model-name">ggml-large-v3-turbo</div>
          <div class="model-size">~1.5 GB · 支持中英文 · 高精度</div>
        </div>
        <div id="download-progress-area" class="hidden" style="margin-bottom:16px;">
          <div class="progress-bar-container">
            <div id="download-progress-bar" class="progress-bar"></div>
          </div>
          <p id="download-status" class="progress-message" style="margin-top:8px;">准备下载...</p>
        </div>
        <button id="btn-download" class="btn btn-primary" style="width:100%;justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14m0 0l-4-4m4 4l4-4"/></svg>
          <span id="btn-download-text">下载模型</span>
        </button>
      </div>
    </div>

    <main class="app-container">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <svg class="app-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span class="app-title">AnyScribe</span>
          <span class="app-subtitle">本地离线转录</span>
        </div>
        <div class="header-right">
          <div class="lang-selector">
            <select id="language-select">
              <option value="">自动检测</option>
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
            </select>
          </div>
          <button id="btn-theme" class="icon-btn" title="切换主题">
            <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg id="icon-moon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
          <a href="https://github.com/nolanzhao/any_scribe" target="_blank" class="icon-btn" title="GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </header>

      <!-- Source Selector -->
      <div id="source-grid" class="source-grid">
        <button class="source-card" data-source="local">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M10 9l5 3-5 3z"/>
          </svg>
          <span class="source-label">本地文件</span>
          <span class="source-desc">视频/音频</span>
        </button>
        <button class="source-card" data-source="douyin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12a4 4 0 104 4V4a5 5 0 005 5"/>
          </svg>
          <span class="source-label">抖音</span>
          <span class="source-desc">视频转录</span>
        </button>
        <button class="source-card" data-source="xhs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
            <path d="M8 7h8M8 11h8M8 15h4"/>
          </svg>
          <span class="source-label">小红书</span>
          <span class="source-desc">视频转录</span>
        </button>
        <button class="source-card" data-source="xiaoyuzhou">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="source-label">小宇宙</span>
          <span class="source-desc">播客转录</span>
        </button>

      </div>

      <!-- Local: Drop Zone -->
      <div id="drop-zone" class="drop-zone hidden">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <path d="M10 9l5 3-5 3z"/>
        </svg>
        <h3>选择或拖入视频文件</h3>
        <p>支持 MP4 / MKV / AVI / MOV 等常见格式</p>
        <button id="btn-select-file" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          选择文件
        </button>
      </div>

      <!-- URL: Input Zone -->
      <div id="url-zone" class="drop-zone hidden">
        <svg id="url-zone-icon" class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        <h3 id="url-zone-title">粘贴链接</h3>
        <p id="url-zone-hint">支持分享链接或短链接</p>
        <div class="url-input-row">
          <input id="url-input" class="url-input" type="text" placeholder="粘贴链接到这里..." autocomplete="off" spellcheck="false" />
          <button id="btn-start-url" class="btn btn-primary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            开始
          </button>
        </div>
      </div>

      <!-- File Info Bar (local) -->
      <div id="file-info" class="file-info glass hidden">
        <div class="file-info-left">
          <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M10 9l5 3-5 3z"/>
          </svg>
          <div class="file-details">
            <span id="file-name" class="file-name">video.mp4</span>
            <span id="file-path" class="file-path">/path/to/video.mp4</span>
          </div>
        </div>
        <div class="file-info-right">
          <button id="btn-change-file" class="btn btn-ghost btn-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
            更换
          </button>
          <button id="btn-start-local" class="btn btn-primary btn-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            开始转录
          </button>
        </div>
      </div>

      <!-- Task Info Bar (URL sources, shown during/after processing) -->
      <div id="task-info" class="file-info glass hidden">
        <div class="file-info-left">
          <svg id="task-icon" class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
          </svg>
          <div class="file-details">
            <span id="task-title" class="file-name">正在获取信息...</span>
            <span id="task-url" class="file-path">—</span>
          </div>
        </div>
        <div class="file-info-right">
          <button id="btn-new-task" class="btn btn-ghost btn-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
            新任务
          </button>
        </div>
      </div>

      <!-- Progress Section -->
      <div id="progress-section" class="progress-section glass hidden">
        <div class="progress-header">
          <span id="progress-stage" class="progress-stage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loading-spin"><path d="M12 2v4m0 12v4m-7.07-14.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
            准备中
          </span>
          <span id="progress-percent" class="progress-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="transcribe-progress-bar" class="progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
          <p id="progress-message" class="progress-message" style="margin-top: 0;">正在初始化...</p>
          <button id="btn-cancel" class="btn btn-outline btn-sm hidden" style="color: var(--error); border-color: var(--error);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            取消
          </button>
        </div>
      </div>

      <!-- Results Section -->
      <div id="results-section" class="results-section hidden">
        <div class="results-header">
          <div class="results-stats">
            <span id="segment-count" class="stat-badge">0 段</span>
            <span id="total-duration" class="stat-badge">00:00</span>
          </div>
          <div class="results-actions">
            <button id="btn-open-media" class="btn btn-outline btn-sm hidden">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              打开媒体
            </button>
            <button id="btn-open-folder" class="btn btn-outline btn-sm hidden">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
              文件夹
            </button>
            <button id="btn-export-srt" class="btn btn-outline btn-sm">SRT</button>
            <button id="btn-export-txt" class="btn btn-outline btn-sm">TXT</button>
            <button id="btn-copy-all" class="btn btn-outline btn-sm">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              复制
            </button>
          </div>
        </div>

        <div id="completion-banner" class="completion-banner hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <span id="completion-message">文件已自动保存</span>
        </div>

        <div id="timeline" class="timeline glass-elevated"></div>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <p>选择来源开始转录</p>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
